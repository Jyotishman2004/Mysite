<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_8 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_8" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_8');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Bauhaus Palette
const colors = {
  red: 0xdb1a1a,
  black: 0x1a1a1a,
  white: 0xf2f2f2
};

// Create a Neo-Brutalist Monolith (Complex Box)
const group = new THREE.Group();

const mainGeo = new THREE.BoxGeometry(2, 3.5, 0.5);
const mainMat = new THREE.MeshPhongMaterial({ 
  color: colors.black,
  shininess: 100,
  specular: colors.red
});
const monolith = new THREE.Mesh(mainGeo, mainMat);
group.add(monolith);

// Add "Form Follows Function" structural details
const detailGeo = new THREE.BoxGeometry(2.1, 0.1, 0.6);
const detailMat = new THREE.MeshPhongMaterial({ color: colors.red });
for(let i = -1.5; i <= 1.5; i += 0.5) {
  const bar = new THREE.Mesh(detailGeo, detailMat);
  bar.position.y = i;
  group.add(bar);
}

scene.add(group);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(colors.red, 2, 10);
pointLight.position.set(2, 2, 2);
scene.add(pointLight);

const whiteLight = new THREE.PointLight(0xffffff, 1, 10);
whiteLight.position.set(-2, -2, 2);
scene.add(whiteLight);

// Interaction
let mouseX = 0;
let mouseY = 0;
let targetX = 0;
let targetY = 0;

window.addEventListener('mousemove', (event) => {
  mouseX = (event.clientX / window.innerWidth) - 0.5;
  mouseY = (event.clientY / window.innerHeight) - 0.5;
});

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

function animate() {
  requestAnimationFrame(animate);
  
  targetX = mouseX * 0.5;
  targetY = mouseY * 0.5;
  
  group.rotation.y += (targetX - group.rotation.y) * 0.05;
  group.rotation.x += (targetY - group.rotation.x) * 0.05;
  
  // Ambient float
  group.position.y = Math.sin(Date.now() * 0.001) * 0.1;
  
  renderer.render(scene, camera);
}

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_8 -->
</body>
</html>
